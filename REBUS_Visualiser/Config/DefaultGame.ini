

[/Script/CommonUI.CommonUISettings]
CommonButtonAcceptKeyHandling=TriggerClick

[/Script/EngineSettings.GeneralProjectSettings]
ProjectID=EF4EB9004FE46F574A263CA79C229276

; Cook the generated REBUS content + the engine basic shapes even when nothing in a packaged map
; references them. The emissive lens-flare material (/Game/REBUS/Materials/M_RebusLensFlare) is
; loaded by PATH at runtime (RebusFixtureActor::BuildLensDisc), which is NOT a cook dependency, so
; without this it gets stripped from -game/packaged builds and the lens disc never appears.
; /Engine/BasicShapes carries the Plane mesh the disc uses. (The actor also hard-refs both from
; its CDO as belt-and-suspenders.)
[/Script/UnrealEd.ProjectPackagingSettings]
+DirectoriesToAlwaysCook=(Path="/Game/REBUS")
+DirectoriesToAlwaysCook=(Path="/Engine/BasicShapes")
; v1.0.43: Epic's official DMX Fixtures beam/lens content (SM_Beam_RM + MI_Beam / M_Beam_Master)
; lives under the /DMXFixtures plugin mount. Force-cook it so packaged builds include Epic's beam
; (it is referenced only at runtime via the actor's soft path / CDO finder, so it would otherwise be
; cook-stripped). Harmless if the DMX Fixtures content isn't installed.
+DirectoriesToAlwaysCook=(Path="/DMXFixtures/LightFixtures")

; RebusVisualiser plugin config. PortalUrl and ApiKey can also be passed on the launch
; command line (-PortalUrl= / -RebusApiKey=), which takes precedence over these values.
; IMPORTANT: quote the URL -- UE strips "//" from unquoted .ini values, so an unquoted
; https:// host is lost (see ue-plugin-build-guide.md §4.0). The x-api-key is a secret and
; should normally be injected by PRISM on the command line rather than committed here.
[RebusVisualiser]
PortalUrl="https://app.rebus.industries"
ApiKey=
; v1.0.43: optional overrides for Epic's DMX beam asset object paths, in case a future DMX content
; revision relocates them. Defaults (verified for UE 5.7) are used when these are unset.
; EpicDmxBeamMaterial="/DMXFixtures/LightFixtures/DMX_Materials/MI_Beam.MI_Beam"
; EpicDmxBeamMesh="/DMXFixtures/LightFixtures/Meshes/SM_Beam_RM.SM_Beam_RM"
