; MegaLights + volumetric baseline (read at startup; applies in -game / packaged). The
; RenderQuality scene property re-tunes the MegaLights volume grid + sample count at runtime per
; tier (live is seeded as the runtime default). The engine VolumetricFog froxel-grid CVars below
; are FIXED defaults and are NOT tier-controlled. See README.md §5.7.
[SystemSettings]
r.MegaLights.Allow=1
r.MegaLights.NumSamplesPerPixel=4
r.MegaLights.DownsampleMode=1
r.MegaLights.Volume=1
r.MegaLights.Volume.GridPixelSize=2
r.MegaLights.Volume.GridSizeZ=128
; v1.0.37: finer froxel grid (8->4->2 px) + more temporal history (0.75->0.9, the engine default)
; so the hero-shadow fog beams read as a SMOOTH shaft instead of coarse blotches. GridPixelSize is
; the froxel screen-XY footprint -> the dominant driver of "patchy" beam scattering; halving it
; halves the patch size. HistoryWeight 0.9 settles froxel temporal noise (beams move slowly, so the
; slight extra latency is unnoticeable). Cost: ~4x froxels in XY -- acceptable on target hardware.
r.VolumetricFog.HistoryWeight=0.9
r.VolumetricFog.GridPixelSize=2
r.VolumetricFog.GridSizeZ=128

; v1.0.54 / v1.0.55: allow Pixel Streaming "Command" / "ConsoleCommand" messages from the portal
; so the remote console works (e.g. SetSceneProperty / Rebus.* CVars / stat fps). The Pixel
; Streaming streamer silently drops console commands unless this CVar is 1 (defaults off for
; security). v1.0.55: this project enables the **PixelStreaming2** plugin (verified in
; REBUS_Visualiser.uproject), which uses a DIFFERENT CVar than the legacy PixelStreaming (PS1)
; plugin -- the v1.0.54 PS1 line alone had no effect. Engine source proof (UE 5.7):
;   PS1 gate:  Engine/Plugins/Media/PixelStreaming/Source/PixelStreamingInput/Private/Settings.cpp:8
;              -> CVarPixelStreamingInputAllowConsoleCommands("PixelStreaming.AllowPixelStreamingCommands")
;   PS2 gate:  Engine/Plugins/Media/PixelStreaming2/Source/PixelStreaming2Settings/Private/
;              PixelStreaming2PluginSettings.cpp:621
;              -> CVarInputAllowConsoleCommands("PixelStreaming2.AllowPixelStreamingCommands")
; Both the PS2 Command handler (RTCInputHandler.cpp:627) AND the PS2 streamer's InitialSettings
; payload to the frontend (EpicRtcStreamer.cpp:923-926) gate on the PS2 CVar; the frontend ALSO
; refuses to send commands unless the InitialSettings JSON says AllowPixelStreamingCommands=true
; (PixelStreaming.ts:568). So we MUST set the PS2 CVar BEFORE the streamer sends InitialSettings
; on the first data channel connect.
PixelStreaming.AllowPixelStreamingCommands=1
PixelStreaming2.AllowPixelStreamingCommands=1

; [ConsoleVariables] is processed VERY early in engine boot (FConfigCacheIni -> ApplyCVarSettings),
; before plugin StartupModule calls. Setting the gate here guarantees it's true before the PS2
; streamer / data channel / InitialSettings handshake runs, which is the only window where the
; frontend can latch on to AllowPixelStreamingCommands=true. The duplicate of the PS2 line in
; [SystemSettings] above is defence-in-depth (different engine load phase).
[ConsoleVariables]
PixelStreaming.AllowPixelStreamingCommands=1
PixelStreaming2.AllowPixelStreamingCommands=1

